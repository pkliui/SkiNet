GENERAL_CONFIG:
  experiment_type: "segmentation"
  model: "UNET2D_MODEL"
  dataset: "PH2_DATASET"
DATA_CONFIG:
  local_data_root:
  azure_data: True
  azure_blob_mount_point: "/mnt/data/"
  crop_size: [256, 256]
TRANSFORM_CONFIG:
  crop:
    crop_apply: True
    crop_type: "random_resized_crop"
    size: [512, 512]
    scale: [0.8, 1.0]
  spatial_augmentation:
    square_symmetry_apply: True
    square_symmetry_p: 0.5
    affine_apply: True
    affine_scale: [0.5, 1.0]
    affine_translate_percent: {"x": [-0.05, 0.05], "y": [-0.05, 0.05]}
    affine_rotate: [-45, 45]
    affine_shear: {"x": [-15, 15], "y": [-15, 15]}
    perspective_apply: True
    perspective_scale: [0.05, 0.1]
    perspective_p: 0.2
  photometric_augmentation:
    color_jitter_apply: True
    color_jitter_brightness: 0.2
    color_jitter_contrast: 0.2
    color_jitter_saturation: 0.0
    color_jitter_hue: 0.0
    color_jitter_p: 0.5
  compose_kwargs:
    seed: 100
MODEL_CONFIG:

TRAIN_CONFIG:
  log_dir: "lightning_logs"
  experiment_name: "unet2d_ph2_debug"
  run_test_after_fit: true
  test_on_val_split: true
  batch_size: 4
  num_workers: 0
  optimizer_name: "adam"
  lr: 0.1
  max_epochs: 5
  accelerator: "auto"
  devices: "auto"
  log_every_n_steps: 1
  use_mlflow_logger: true
  use_litlogger_logger: true
  use_early_stopping: true
  use_checkpoint: true
  early_stopping_config:
    monitor: "val_loss"
    mode: "min"
    min_delta: 0.0
    patience: 5
    strict: true
    check_finite: true
    stopping_threshold:
    divergence_threshold:
  checkpoint_config:
    monitor: "val_loss"
    mode: "min"
    save_top_k: 3
    save_last: true
    filename: "epoch{epoch:03d}"
  litlogger_config:
    teamspace: "l-pkliui"
    log_model: false
    save_logs: false
    checkpoint_name:
  mlflow_config:
    fallback_to_local_mlflow: false
    tracking_uri: "http://127.0.0.1:5000" # OK
    log_model: "all"
    log_model_summary: true
