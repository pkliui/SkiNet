GENERAL_CONFIG:
  experiment_type: "segmentation"
  model: "UNET2D_MODEL"
  dataset: "PH2_DATASET"
DATA_CONFIG:
  local_data_root:
  azure_data: True
  azure_blob_mount_point: "/mnt/data/"
  split_random_seed: 100
TRANSFORM_CONFIG:
  seed_value: 100
  crop:
    crop_apply: True
    crop_type: "random_resized_crop"
    size: [512, 512]
    scale: [0.8, 1.0]
  spatial_augmentation:
    square_symmetry_apply: True
    square_symmetry_p: 0.5
    affine_apply: False
    affine_scale: [0.8, 1.0]
    affine_translate_percent: {"x": [-0.05, 0.05], "y": [-0.05, 0.05]}
    affine_rotate: [-20, 20]
    affine_shear: {"x": [0, 0], "y": [0, 0]}
    perspective_apply: False
    perspective_scale: [0.05, 0.1]
    perspective_p: 0.2
    elastic_apply: False
    elastic_alpha: 120
    elastic_sigma: 10
    elastic_p: 0.3
  photometric_augmentation:
    color_jitter_apply: False
    color_jitter_brightness: 0.2
    color_jitter_contrast: 0.2
    color_jitter_saturation: 0.3
    color_jitter_hue: 0.05
    color_jitter_p: 0.5
    gaussian_blur_apply: False
    gaussian_blur_sigma_limit: [0.5, 2.0]
    gaussian_blur_p: 0.2
    gaussian_noise_apply: False
    gaussian_noise_std_range: [0.05, 0.15]
    gaussian_noise_p: 0.2
MODEL_CONFIG:
  validate_forward: true
  debug_fiorward: false
  encoder_residual_mode: "he2"        # "he2" | "local_refinement"
  merge_residual_mode: "local_refinement"          # "he2" | "he1" | "local_refinement"
SWEEP_CONFIG:
  monitor: "val_best_dice_at_threshold"
  direction: "maximize"
  experiment_name: "optuna_sweep"
  lr: [3e-4, 1e-4]
  weight_decay: [1e-4, 1e-3]
  batch_size: [16, 32]
TRAIN_CONFIG:
  log_dir: "lightning_logs"
  experiment_name: "ab_unet2d-ph2_enc-he2_merge-local_refinement"
  run_test_after_fit: false
  test_on_val_split: false
  batch_size: 8
  num_workers: 4
  pin_memory: true
  prefetch_factor: 8
  cache_in_ram: true  # set false for datasets too large to fit in RAM
  loss_name: "bce_dice"
  optimizer_name: "adamw"
  lr: 3e-4
  weight_decay: 1e-4
  optimal_threshold: 0.5
  seed: 100
  deterministic: true
  max_epochs: 150
  accelerator: "gpu"
  devices: 1
  log_every_n_steps: 1
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 0
  use_mlflow_logger: true
  use_litlogger_logger: true
  use_early_stopping: true
  use_checkpoint: true
  early_stopping_config:
    monitor: "val_best_dice_at_threshold"
    mode: "max"
    min_delta: 0.005
    patience: 30
    strict: true
    check_finite: true
    stopping_threshold:
    divergence_threshold:
  checkpoint_config:
    monitor: "val_best_dice_at_threshold"
    mode: "max"
    save_top_k: 1
    save_last: true
    filename: "epoch{epoch:03d}"
  litlogger_config:
    teamspace: "l-pkliui"
    log_model: false
    save_logs: false
    checkpoint_name:
  mlflow_config:
    fallback_to_local_mlflow: false
    tracking_uri: "http://127.0.0.1:5000" # OK
    log_model: "all"
    log_model_summary: true
  lr_scheduler_config:
    monitor: "val_best_dice_at_threshold"
    mode: "max"
    patience: 3
    factor: 0.5
