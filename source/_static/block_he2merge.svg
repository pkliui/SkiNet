<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 220" aria-label="He2 merge block data-flow diagram">
  <!-- skip input -->
  <text x="5" y="39" font-size="12" font-family="system-ui,sans-serif" fill="#444" font-weight="600">skip</text>
  <line x1="38" y1="35" x2="48" y2="35" stroke="#666" stroke-width="1.5"/>
  <polygon points="48,31 56,35 48,39" fill="#666"/>
  <rect x="56" y="17" width="85" height="36" rx="4" fill="#e8e0f8" stroke="#6655bb" stroke-width="1.3"/>
  <text x="98" y="31" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#2a2070" font-weight="600">conv_skip</text>
  <text x="98" y="45" text-anchor="middle" font-size="9"  font-family="system-ui,sans-serif" fill="#6655bb">3×3</text>

  <!-- dec input -->
  <text x="5" y="176" font-size="12" font-family="system-ui,sans-serif" fill="#444" font-weight="600">dec</text>
  <line x1="38" y1="172" x2="48" y2="172" stroke="#666" stroke-width="1.5"/>
  <polygon points="48,168 56,172 48,176" fill="#666"/>
  <rect x="56" y="154" width="85" height="36" rx="4" fill="#e8e0f8" stroke="#6655bb" stroke-width="1.3"/>
  <text x="98" y="168" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#2a2070" font-weight="600">conv_dec</text>
  <text x="98" y="182" text-anchor="middle" font-size="9"  font-family="system-ui,sans-serif" fill="#6655bb">3×3</text>

  <!-- routing skip → ⊕₁ top -->
  <line x1="141" y1="35"  x2="215" y2="35"  stroke="#666" stroke-width="1.5"/>
  <line x1="215" y1="35"  x2="215" y2="79"  stroke="#666" stroke-width="1.5"/>
  <polygon points="211,79 219,79 215,87" fill="#666"/>

  <!-- routing dec → ⊕₁ bottom -->
  <line x1="141" y1="172" x2="215" y2="172" stroke="#666" stroke-width="1.5"/>
  <line x1="215" y1="172" x2="215" y2="121" stroke="#666" stroke-width="1.5"/>
  <polygon points="211,121 219,121 215,113" fill="#666"/>

  <!-- ⊕₁ -->
  <circle cx="215" cy="100" r="13" fill="#fffacc" stroke="#aa8800" stroke-width="1.5"/>
  <text x="215" y="105" text-anchor="middle" font-size="15" font-family="system-ui,sans-serif" fill="#5a4000">⊕</text>
  <text x="215" y="127" text-anchor="middle" font-size="9"  font-family="system-ui,sans-serif" fill="#999" font-style="italic">merged</text>

  <!-- ⊕₁ → chain -->
  <line x1="228" y1="100" x2="238" y2="100" stroke="#666" stroke-width="1.5"/>
  <polygon points="238,96 246,100 238,104" fill="#666"/>

  <rect x="246" y="82" width="36" height="36" rx="4" fill="#d8edd8" stroke="#3a7a3a" stroke-width="1.3"/>
  <text x="264" y="105" text-anchor="middle" font-size="12" font-family="system-ui,sans-serif" fill="#1a4a1a" font-weight="600">BN</text>
  <line x1="282" y1="100" x2="292" y2="100" stroke="#666" stroke-width="1.5"/>
  <polygon points="292,96 300,100 292,104" fill="#666"/>

  <rect x="300" y="82" width="48" height="36" rx="4" fill="#fde8cc" stroke="#cc7a00" stroke-width="1.3"/>
  <text x="324" y="105" text-anchor="middle" font-size="12" font-family="system-ui,sans-serif" fill="#7a3a00" font-weight="600">ReLU</text>
  <line x1="348" y1="100" x2="358" y2="100" stroke="#666" stroke-width="1.5"/>
  <polygon points="358,96 366,100 358,104" fill="#666"/>

  <rect x="366" y="82" width="68" height="36" rx="4" fill="#dce8f8" stroke="#4a7cc7" stroke-width="1.3"/>
  <text x="400" y="97"  text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#1a3a6b" font-weight="600">Conv 3×3</text>
  <text x="400" y="111" text-anchor="middle" font-size="9"  font-family="system-ui,sans-serif" fill="#4a7cc7">stride 1</text>
  <line x1="434" y1="100" x2="444" y2="100" stroke="#666" stroke-width="1.5"/>
  <polygon points="444,96 452,100 444,104" fill="#666"/>

  <rect x="452" y="82" width="36" height="36" rx="4" fill="#d8edd8" stroke="#3a7a3a" stroke-width="1.3"/>
  <text x="470" y="105" text-anchor="middle" font-size="12" font-family="system-ui,sans-serif" fill="#1a4a1a" font-weight="600">BN</text>
  <line x1="488" y1="100" x2="498" y2="100" stroke="#666" stroke-width="1.5"/>
  <polygon points="498,96 506,100 498,104" fill="#666"/>

  <rect x="506" y="82" width="48" height="36" rx="4" fill="#fde8cc" stroke="#cc7a00" stroke-width="1.3"/>
  <text x="530" y="105" text-anchor="middle" font-size="12" font-family="system-ui,sans-serif" fill="#7a3a00" font-weight="600">ReLU</text>
  <line x1="554" y1="100" x2="564" y2="100" stroke="#666" stroke-width="1.5"/>
  <polygon points="564,96 572,100 564,104" fill="#666"/>

  <rect x="572" y="82" width="68" height="36" rx="4" fill="#dce8f8" stroke="#4a7cc7" stroke-width="1.3"/>
  <text x="606" y="97"  text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#1a3a6b" font-weight="600">Conv 3×3</text>
  <text x="606" y="111" text-anchor="middle" font-size="9"  font-family="system-ui,sans-serif" fill="#4a7cc7">stride 1</text>
  <line x1="640" y1="100" x2="650" y2="100" stroke="#666" stroke-width="1.5"/>
  <polygon points="650,96 658,100 650,104" fill="#666"/>

  <!-- ⊕₂ -->
  <circle cx="671" cy="100" r="13" fill="#fffacc" stroke="#aa8800" stroke-width="1.5"/>
  <text x="671" y="105" text-anchor="middle" font-size="15" font-family="system-ui,sans-serif" fill="#5a4000">⊕</text>
  <line x1="684" y1="100" x2="696" y2="100" stroke="#666" stroke-width="1.5"/>
  <polygon points="696,96 704,100 696,104" fill="#666"/>

  <text x="706" y="105" font-size="13" font-family="system-ui,sans-serif" fill="#444">out</text>

  <!-- identity shortcut arc -->
  <path d="M 215,113 C 215,202 671,202 671,121" fill="none" stroke="#999" stroke-width="1.3" stroke-dasharray="5,3"/>
  <polygon points="667,121 675,121 671,113" fill="#999"/>
  <text x="443" y="212" text-anchor="middle" font-size="9" font-family="system-ui,sans-serif" fill="#999" font-style="italic">identity shortcut (merged)</text>
</svg>
