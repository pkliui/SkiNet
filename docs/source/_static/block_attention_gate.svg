<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" aria-label="Additive attention gate data-flow diagram">
  <!-- raw skip tap routed along the top into the elementwise multiply -->
  <circle cx="44" cy="35" r="2.5" fill="#666"/>
  <line x1="44" y1="35" x2="44" y2="12" stroke="#999" stroke-width="1.3" stroke-dasharray="5,3"/>
  <line x1="44" y1="12" x2="566" y2="12" stroke="#999" stroke-width="1.3" stroke-dasharray="5,3"/>
  <line x1="566" y1="12" x2="566" y2="80" stroke="#999" stroke-width="1.3" stroke-dasharray="5,3"/>
  <polygon points="562,80 570,80 566,88" fill="#999"/>
  <text x="300" y="9" font-size="9" font-family="system-ui,sans-serif" fill="#999" font-style="italic">raw skip x (gated, not projected)</text>

  <!-- skip input -->
  <text x="5" y="39" font-size="12" font-family="system-ui,sans-serif" fill="#444" font-weight="600">skip</text>
  <line x1="34" y1="35" x2="48" y2="35" stroke="#666" stroke-width="1.5"/>
  <polygon points="48,31 56,35 48,39" fill="#666"/>
  <rect x="56" y="17" width="92" height="36" rx="4" fill="#e8e0f8" stroke="#6655bb" stroke-width="1.3"/>
  <text x="102" y="31" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#2a2070" font-weight="600">W_x</text>
  <text x="102" y="45" text-anchor="middle" font-size="9"  font-family="system-ui,sans-serif" fill="#6655bb">1×1 conv → BN</text>

  <!-- gating (decoder) input -->
  <text x="2" y="176" font-size="12" font-family="system-ui,sans-serif" fill="#444" font-weight="600">g (dec)</text>
  <line x1="44" y1="172" x2="48" y2="172" stroke="#666" stroke-width="1.5"/>
  <polygon points="48,168 56,172 48,176" fill="#666"/>
  <rect x="56" y="154" width="92" height="36" rx="4" fill="#e8e0f8" stroke="#6655bb" stroke-width="1.3"/>
  <text x="102" y="168" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#2a2070" font-weight="600">W_g</text>
  <text x="102" y="182" text-anchor="middle" font-size="9"  font-family="system-ui,sans-serif" fill="#6655bb">1×1 conv → BN</text>

  <!-- route W_x → ⊕ (top down) -->
  <line x1="148" y1="35" x2="192" y2="35" stroke="#666" stroke-width="1.5"/>
  <line x1="192" y1="35" x2="192" y2="79" stroke="#666" stroke-width="1.5"/>
  <polygon points="188,79 196,79 192,87" fill="#666"/>

  <!-- route W_g → ⊕ (bottom up) -->
  <line x1="148" y1="172" x2="192" y2="172" stroke="#666" stroke-width="1.5"/>
  <line x1="192" y1="172" x2="192" y2="121" stroke="#666" stroke-width="1.5"/>
  <polygon points="188,121 196,121 192,113" fill="#666"/>

  <!-- ⊕ additive combine -->
  <circle cx="192" cy="100" r="13" fill="#fffacc" stroke="#aa8800" stroke-width="1.5"/>
  <text x="192" y="105" text-anchor="middle" font-size="15" font-family="system-ui,sans-serif" fill="#5a4000">⊕</text>

  <!-- ⊕ → ReLU -->
  <line x1="205" y1="100" x2="215" y2="100" stroke="#666" stroke-width="1.5"/>
  <polygon points="215,96 223,100 215,104" fill="#666"/>
  <rect x="223" y="82" width="48" height="36" rx="4" fill="#fde8cc" stroke="#cc7a00" stroke-width="1.3"/>
  <text x="247" y="105" text-anchor="middle" font-size="12" font-family="system-ui,sans-serif" fill="#7a3a00" font-weight="600">ReLU</text>

  <!-- ReLU → ψ Conv 1×1 -->
  <line x1="271" y1="100" x2="281" y2="100" stroke="#666" stroke-width="1.5"/>
  <polygon points="281,96 289,100 281,104" fill="#666"/>
  <rect x="289" y="82" width="66" height="36" rx="4" fill="#dce8f8" stroke="#4a7cc7" stroke-width="1.3"/>
  <text x="322" y="97"  text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#1a3a6b" font-weight="600">ψ: Conv</text>
  <text x="322" y="111" text-anchor="middle" font-size="9"  font-family="system-ui,sans-serif" fill="#4a7cc7">1×1 → 1ch</text>

  <!-- ψ Conv → BN -->
  <line x1="355" y1="100" x2="365" y2="100" stroke="#666" stroke-width="1.5"/>
  <polygon points="365,96 373,100 365,104" fill="#666"/>
  <rect x="373" y="82" width="36" height="36" rx="4" fill="#d8edd8" stroke="#3a7a3a" stroke-width="1.3"/>
  <text x="391" y="105" text-anchor="middle" font-size="12" font-family="system-ui,sans-serif" fill="#1a4a1a" font-weight="600">BN</text>

  <!-- BN → Sigmoid -->
  <line x1="409" y1="100" x2="419" y2="100" stroke="#666" stroke-width="1.5"/>
  <polygon points="419,96 427,100 419,104" fill="#666"/>
  <rect x="427" y="82" width="70" height="36" rx="4" fill="#d8f0ee" stroke="#2a8a7a" stroke-width="1.3"/>
  <text x="462" y="105" text-anchor="middle" font-size="11" font-family="system-ui,sans-serif" fill="#14534a" font-weight="600">Sigmoid</text>

  <!-- Sigmoid → ⊗ (α) -->
  <line x1="497" y1="100" x2="540" y2="100" stroke="#666" stroke-width="1.5"/>
  <polygon points="540,96 548,100 540,104" fill="#666"/>
  <text x="518" y="93" text-anchor="middle" font-size="11" font-family="system-ui,sans-serif" fill="#5a4000" font-style="italic">α ∈ [0,1]</text>

  <!-- ⊗ elementwise gate of the raw skip -->
  <circle cx="566" cy="100" r="13" fill="#fffacc" stroke="#aa8800" stroke-width="1.5"/>
  <text x="566" y="105" text-anchor="middle" font-size="15" font-family="system-ui,sans-serif" fill="#5a4000">⊗</text>

  <!-- ⊗ → output -->
  <line x1="579" y1="100" x2="591" y2="100" stroke="#666" stroke-width="1.5"/>
  <polygon points="591,96 599,100 591,104" fill="#666"/>
  <text x="601" y="98" font-size="11" font-family="system-ui,sans-serif" fill="#444" font-weight="600">gated skip</text>
  <text x="601" y="111" font-size="9"  font-family="system-ui,sans-serif" fill="#999" font-style="italic">x · α → merge</text>
</svg>
