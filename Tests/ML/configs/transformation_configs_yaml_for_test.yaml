augmentation:
  random_affine_apply: True
  random_horizontal_flip_apply: True
  random_vertical_flip_apply: True
  random_perspective_apply : False
  random_equalize_apply: False
  random_colorjitter_apply: False
  center_crop_apply: True
  random_affine:
    degrees: 180
    translate: (0.1, 0.1)
    shear: 30
  random_horizontal_flip:
    p: 0.5
  random_vertical_flip:
    p: 0.5
  random_perspective:
    distortion_scale: 0.1
    p: 0.5
  random_equalize:
    p: 0.5
  random_colorjitter:
    brightness: 0.5
    contrast: 0.5
    saturation: 0.5
    hue: 0.5
  center_crop:
    size: (400, 400)



