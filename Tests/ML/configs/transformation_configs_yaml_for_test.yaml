augmentation:
  horizontal_flip_apply: True
  horizontal_flip:
    p: 0.5
  vertical_flip_apply: True
  vertical_flip:
    p: 0.5
  affine_apply: True
  affine:
    rotate: (-90, 90)
    translate_percent: (0.1, 0.1)
    shear: (-20, 20)
  colorjitter_apply: True
  colorjitter:
    brightness: 0.1
    contrast: 0.1
    saturation: 0.1
    p: 0.5
  center_crop_apply: True
  center_crop:
    height: 400
    width: 400